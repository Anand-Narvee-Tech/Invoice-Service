spring.application.name=INVOICE-SERVICE

# Default profile (can be overridden by environment)
spring.profiles.active=uatl
server.port=5671

## ===========================
## Eureka registration
## ===========================
#eureka.client.register-with-eureka=true
#eureka.client.fetch-registry=true
#spring.cloud.compatibility-verifier.enabled=false
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
#eureka.instance.prefer-ip-address=true

# ===========================
# Database
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/Invoice
spring.datasource.username=postgres
spring.datasource.password=Narvee123$
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=invoice

# ===========================
# Flyway
# ===========================
spring.flyway.schemas=invoice
spring.flyway.baseline-on-migrate=true

# ===========================
# Multipart file upload
# ===========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===========================
# File upload directory (default)
# ===========================
file.upload-dir=uploaded_files

# ===========================
# Tesseract OCR
# ===========================
tesseract.datapath=C:\\tesseract
tesseract.language=eng
