spring.application.name=INVOICE-SERVICE

# Default profile (can be overridden by environment)
#spring.profiles.active=uatl
spring.profiles.active=prod
server.port=5671

# Increase read timeout for peer replication (default 5000ms)
eureka.server.peer-node-read-timeout-ms=10000

# Increase eviction interval
eureka.instance.lease-expiration-duration-in-seconds=90
eureka.instance.lease-renewal-interval-in-seconds=30

# Eureka registration
# ===========================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.cloud.compatibility-verifier.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===========================
# Database
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/Invoice
spring.datasource.username=postgres
spring.datasource.password=Narvee123$
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=invoice

# ===========================
# Flyway
# ===========================
spring.flyway.schemas=invoice
spring.flyway.baseline-on-migrate=true

customer.service.url=http://localhost:5679

#spring.servlet.multipart.enabled=true
#spring.servlet.multipart.max-file-size=10MB
#spring.servlet.multipart.max-request-size=10MB

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# File upload directory (can be overridden by environment variable)
file.upload-dir=${UPLOAD_DIR:/opt/invoice-service/uploads}

# ===========================
# File upload directory (default)
# ===========================
#file.upload-dir=uploaded_files

# ===========================
# Tesseract OCR
# ===========================
tesseract.datapath=C:\\tesseract
tesseract.language=eng

login.service.base-url=http://localhost:5678


# Mail (optional)
spring.mail.host=host.narveetech.com
spring.mail.port=465
spring.mail.username=no-reply@singularanalysts.com
spring.mail.password=qL!DO@{^Uci{tHyx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.from=no-reply@singularanalysts.com

# Actuator for health check
management.endpoints.web.exposure.include=*
