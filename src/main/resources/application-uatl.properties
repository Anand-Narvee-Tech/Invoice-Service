spring.application.name=INVOICE-SERVICE

#spring.profiles.active=uatl
server.port=5671

# Increase read timeout for peer replication (default 5000ms)
eureka.server.peer-node-read-timeout-ms=10000

# Increase eviction interval
eureka.instance.lease-expiration-duration-in-seconds=90
eureka.instance.lease-renewal-interval-in-seconds=30

# Eureka registration
# ===========================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.cloud.compatibility-verifier.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8762/eureka/
eureka.instance.prefer-ip-address=true

# Absolute path on UAT server
#file.upload-dir=/opt/invoice-service/uat_uploaded_files

## Database (pointing to UAT DB)
#spring.datasource.url=jdbc:postgresql://uat-server:5432/Invoice_UAT
#spring.datasource.username=uat_user
#spring.datasource.password=uat_pass


# Database (connect to lowercase DB 'invoice')
spring.datasource.url=jdbc:postgresql://localhost:5432/Invoice
spring.datasource.username=postgres
spring.datasource.password=Narvee@123$
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=invoice

# Flyway
spring.flyway.schemas=invoice
spring.flyway.baseline-on-migrate=true

customer.service.url=http://10.10.0.200:5679

#spring.servlet.multipart.enabled=true
#spring.servlet.multipart.max-file-size=10MB
#spring.servlet.multipart.max-request-size=10MB

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

file.upload-dir=${UPLOAD_DIR:/data/uat/invoice/uploads}

# Tesseract OCR settings
